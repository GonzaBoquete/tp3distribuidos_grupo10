<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Crear Catálogo de Productos</h1>
    <form method="POST" action="/catalogo">
        <label for="catalog_name">Nombre del Catálogo:</label>
        <input type="text" id="catalog_name" name="catalog_name">

        <label for="product_data">Datos del Producto:</label>
        <textarea id="product_data" name="product_data"></textarea>

        <button type="submit">Crear Catálogo</button>
    </form>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <ul>
            {% for category, message in messages %}
            <li class="{{ category }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
    {% endwith %}
</body>
</html>
